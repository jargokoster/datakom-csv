services:
  api:
    build: .
    ports:
      - "8888:80"
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      # Keep the image's installed dependencies; don't let the host bind mount hide them.
      - /var/www/html/vendor
      - sqlite-data:/var/www/html/database

volumes:
  sqlite-data:
